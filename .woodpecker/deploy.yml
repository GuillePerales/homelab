when:
  event: push
  branch: main
  path:
    include: ["services/docker-compose/**"]

steps:
  - name: sops-decrypt
    image: mozilla/sops:latest
    secrets:
      - sops_age_key
    commands:
      - echo "$SOPS_AGE_KEY" > /tmp/age.key
      - export SOPS_AGE_KEY_FILE=/tmp/age.key
      # Validar que podemos desencriptar los .enc
      - |
        find services/docker-compose -name "*.enc" | while read f; do
          sops --decrypt "$f" > /dev/null || exit 1
        done
      - rm -f /tmp/age.key

  - name: portainer-deploy
    image: curlimages/curl:latest
    secrets:
      - portainer_webhook_core
      - portainer_webhook_media
    environment:
      - CHANGED_FILES=${CI_COMMIT_CHANGED_FILES}
    commands:
      - |
        echo "Changed files: $CHANGED_FILES"
        # Trigger webhook solo si cambió el stack correspondiente
        if echo "$CHANGED_FILES" | grep -q "docker-compose/core"; then
          curl -X POST "$PORTAINER_WEBHOOK_CORE" --silent --fail
          echo "Triggered core stack deploy"
        fi
        if echo "$CHANGED_FILES" | grep -q "docker-compose/media"; then
          curl -X POST "$PORTAINER_WEBHOOK_MEDIA" --silent --fail
          echo "Triggered media stack deploy"
        fi