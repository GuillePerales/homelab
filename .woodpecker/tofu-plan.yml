when:
  event: pull_request
  path:
    include: ["infrastructure/opentofu/**"]

steps:
  - name: tofu-fmt
    image: ghcr.io/opentofu/opentofu:latest
    commands:
      - cd infrastructure/opentofu/proxmox
      - tofu fmt -check -recursive

  - name: tofu-validate
    image: ghcr.io/opentofu/opentofu:latest
    commands:
      - cd infrastructure/opentofu/proxmox
      - tofu init -backend=false
      - tofu validate

  - name: tofu-plan
    image: ghcr.io/opentofu/opentofu:latest
    environment:
      - PROXMOX_VE_ENDPOINT=https://10.0.5.12:8006
      - PROXMOX_VE_INSECURE=true
    secrets:
      - proxmox_token_id
      - proxmox_token_secret
    commands:
      - cd infrastructure/opentofu/proxmox
      - tofu init
      - tofu plan -no-color -out=tfplan
      - tofu show -no-color tfplan
    when:
      event: pull_request