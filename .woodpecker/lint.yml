when:
  event: [push, pull_request]

steps:
  - name: yamllint
    image: cytopia/yamllint:latest
    commands:
      - yamllint -d relaxed services/docker-compose/ infrastructure/ansible/ .woodpecker/

  - name: compose-validate
    image: docker:24-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - |
        find services/docker-compose -name "docker-compose.yml" | while read f; do
          echo "Validating $f..."
          docker compose -f "$f" config --quiet || exit 1
        done

  - name: ansible-lint
    image: pipelinecomponents/ansible-lint:latest
    commands:
      - ansible-lint infrastructure/ansible/
    when:
      path:
        include: ["infrastructure/ansible/**"]