# infrastructure/ansible/playbooks/proxmox-node-setup.yml
---
- name: Configure Proxmox nodes
  hosts: proxmox
  become: true

  tasks:
    - name: Disable enterprise repos
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: "^deb "
        replace: "#deb "
      loop:
        - /etc/apt/sources.list.d/pve-enterprise.list
        - /etc/apt/sources.list.d/ceph.list
      ignore_errors: true

    - name: Add no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/pve-no-sub.list
        content: "deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription\n"

    - name: Update and upgrade
      ansible.builtin.apt:
        update_cache: yes
        upgrade: full

    - name: Install utilities
      ansible.builtin.apt:
        name: [vim, curl, wget, htop, iotop, net-tools]
        state: present

    - name: Set timezone
      community.general.timezone:
        name: Europe/Madrid

    - name: Add authorized SSH key
      ansible.posix.authorized_key:
        user: root
        key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/homelab_ed25519.pub') }}"
